<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Page</title>
    <link rel="icon" type = "image/x-icon" href = "logo.png">
    <link rel="stylesheet" href="/lab task-2/design/Style.css">
</head>
<body>
    <div class="container">
    <h1>Student Registration Page</h1>
    <form method = "POST">

        <label>Student Name:</label>
        <input type="text" placeholder="Enter Your Name">
        <br><br>

        <label>Student ID:</label>
        <input type="text" placeholder="Enter Your ID">
        <br><br>

        <label>Gender:</label>
        <div class="gender">
            <label>
                <input type="radio" name="gender"> Male
            </label>

            <label>
                <input type="radio" name="gender"> Female
            </label>
        </div>
        <br>
        <!-- <label>Male</label>
        <input type="radio" name="gender" value="male">
        <br>
        <label>Female</label>
        <input type="radio" name="gender" value="female">
        <br><br> -->
        
        <label>Select Department:</label>
        <select>
            <option value="">Select your department</option>
            <option value="CSE">CSE</option>
            <option value="EEE">EEE</option>
            <option value="BBA">BBA</option>
            <option value="ENG">ENG</option>
            <option value="LAW">LAW</option>
        </select>
        <br><br>
    
        <label>Student CGPA:</label>
        <input type="text" placeholder="Enter Your CGPA">
        <br><br>   
         
        <label>Address:</label>
        <textarea rows="4" cols="40" placeholder="Enter your address here"></textarea>
        <br><br>

        <label>Date of Birth:</label>
        <input type="date" name = "dob">
        <br><br>
        
        <label>Email:</label>
        <input type="email" placeholder="Enter your email">
        <br><br>

        <label>Phone number:</label>
        <input type="phone" placeholder="Enter your phone number" name = "phone">
        <br><br>

        <label>Upload your Grade Report:</label>
        <input type="file">
        <br><br> 

        <div class="checkbox-group">
            <label>
                <input type="checkbox"> I agree to the terms & conditions
            </label>
        </div>
        <br>
        <!-- <input type="checkbox">
        <label>I agree to the terms and conditions</label>
        <br><br> -->

        <label>Submit or reset your information</label>
        <br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</div>
</body>
</html>
