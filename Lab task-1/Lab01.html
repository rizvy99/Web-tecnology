<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Page</title>
</head>
<body>

    <h1>Student Registration Page</h1>
    <form>

        <p>
            Student Name:
            <input type="text" placeholder="Enter Your Name">
            <br><br>


            Student CGPA:
            <input type="text" placeholder="Enter Your CGPA">
            <br><br>

            Male
            <input type="radio" name="gender" value="male">
            <br>

            Female
            <input type="radio" name="gender" value="female">
            <br>
        </p>
        <p>
            Select Department:
            <select>
                <option>CSE</option>
                <option>EEE</option>
                <option>BBA</option>
                <option>ENG</option>
            </select>
            <br>
        </p>

        <p>
            Student ID
            <input type="text">
            <br>
        </p>

        <p>Address:</p>
        <textarea rows="4" cols="40" placeholder="Enter your address here"></textarea>
        <br>

        <p>
            Date of Birth:
            <input type="date">
            <br>
        </p>

        <p>
            Email:
            <input type="email" placeholder="Enter your email">
            <br>
        </p>

        <p>
            Upload your Grade Report:
            <input type="file">
            <br>
        </p>


        <p>
            <input type="checkbox">
            I agree to the terms and conditions
            <br>
        </p>

        <p>
            Phone Number:
            <input type="text" placeholder="Enter your phone number">
            <br>
        </p>

        <p>Submit your information</p>
        <input type="submit" value="Submit">

    </form>

</body>
</html>
